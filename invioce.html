<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Invoice - Billing System</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="invoice.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <!-- Same sidebar as dashboard -->
        </aside>
        
        <main class="main-content">
            <h1>Create New Invoice</h1>
            
            <form id="invoiceForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="customer">Customer</label>
                        <select id="customer" required>
                            <option value="">Select Customer</option>
                            <!-- Filled by JavaScript -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="invoiceDate">Date</label>
                        <input type="date" id="invoiceDate" required>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" required>
                    </div>
                </div>
                
                <div class="invoice-items">
                    <h3>Items</h3>
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Description</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Tax</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="item-row">
                                <td>
                                    <select class="product-select" required>
                                        <option value="">Select Product</option>
                                        <!-- Filled by JavaScript -->
                                    </select>
                                </td>
                                <td><input type="text" class="description" placeholder="Description"></td>
                                <td><input type="number" class="quantity" value="1" min="1" required></td>
                                <td><input type="number" class="price" step="0.01" required></td>
                                <td><span class="tax-rate">0%</span></td>
                                <td><span class="item-total">0.00</span></td>
                                <td><button type="button" class="remove-item">×</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <button type="button" id="addItemBtn" class="btn-secondary">Add Item</button>
                </div>
                
                <div class="invoice-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax:</span>
                        <span id="taxTotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <label for="discount">Discount:</label>
                        <input type="number" id="discount" step="0.01" min="0" value="0">
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="invoiceTotal">$0.00</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="saveDraftBtn" class="btn-secondary">Save Draft</button>
                    <button type="submit" id="createInvoiceBtn" class="btn">Create Invoice</button>
                </div>
            </form>
        </main>
    </div>
    
    <script src="main.js"></script>
    <script src="auth.js"></script>
    <script src="custem.js"></script>
    <script src="product.js"></script>
    <script src="invoice.js"></script>
</body>
</html>
