<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Billing System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="customer.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">Billing System</div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="icon-dashboard"></i> Dashboard</a></li>
                    <li class="active"><a href="customers.html"><i class="icon-customers"></i> Customers</a></li>
                    <li><a href="products.html"><i class="icon-products"></i> Products</a></li>
                    <li><a href="invoices.html"><i class="icon-invoices"></i> Invoices</a></li>
                    <li><a href="create-invoice.html"><i class="icon-create"></i> Create Invoice</a></li>
                    <li><a href="reports.html"><i class="icon-reports"></i> Reports</a></li>
                    <li><a href="settings.html"><i class="icon-settings"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <img src="assets/user.png" alt="User">
                <span>Admin User</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <h1>Customers</h1>
                <button id="addCustomerBtn" class="btn">Add Customer</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="customerSearch" placeholder="Search customers...">
                <button class="btn-secondary">Search</button>
            </div>
            
            <div class="customer-table-container">
                <table id="customerTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Customer rows will be added by JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Add Customer Modal -->
            <div id="customerModal" class="modal">
                <div class="modal-content">
                    <span class="close-modal">&times;</span>
                    <h2 id="modalTitle">Add New Customer</h2>
                    <form id="customerForm">
                        <input type="hidden" id="customerId">
                        <div class="form-group">
                            <label for="customerName">Name*</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Email*</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone</label>
                            <input type="tel" id="customerPhone">
                        </div>
                        <div class="form-group">
                            <label for="customerAddress">Address</label>
                            <textarea id="customerAddress" rows="3"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary close-modal-btn">Cancel</button>
                            <button type="submit" class="btn">Save Customer</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
