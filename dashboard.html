<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Billing System</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="DB.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">Billing System</div>
            <nav>
                <ul>
                    <li class="active"><a href="dashboard.html"><i class="icon-dashboard"></i> Dashboard</a></li>
                    <li><a href="customer.html"><i class="icon-customers"></i> Customers</a></li>
                    <li><a href="products.html"><i class="icon-products"></i> Products</a></li>
                    <li><a href="invoices.html"><i class="icon-invoices"></i> Invoices</a></li>
                    <li><a href="create-invoice.html"><i class="icon-create"></i> Create Invoice</a></li>
                    <li><a href="reports.html"><i class="icon-reports"></i> Reports</a></li>
                    <li><a href="settings.html"><i class="icon-settings"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <img src="assets/user.png" alt="User">
                <span>Admin User</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <h1>Dashboard</h1>
            
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <p class="stat-value" id="totalRevenue">$0.00</p>
                    <p class="stat-change">+0% from last month</p>
                </div>
                <div class="stat-card">
                    <h3>Invoices</h3>
                    <p class="stat-value" id="totalInvoices">0</p>
                    <p class="stat-change">0 unpaid</p>
                </div>
                <div class="stat-card">
                    <h3>Customers</h3>
                    <p class="stat-value" id="totalCustomers">0</p>
                    <p class="stat-change">+0 new this month</p>
                </div>
            </div>
            
            <div class="recent-activity">
                <h2>Recent Invoices</h2>
                <table id="recentInvoicesTable">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Customer</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filled by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="main.js"></script>
    <script src="auth.js"></script>
    <script src="product.js"></script>
</body>
</html>
